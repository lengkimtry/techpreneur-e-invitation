<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Gold offset shadow -->
  <rect x="9" y="9" width="84" height="84" rx="16" fill="#ffd85b"/>
  <!-- Purple main square -->
  <rect x="4" y="4" width="84" height="84" rx="16" fill="#4c14a0"/>

  <!-- T: horizontal top bar -->
  <rect x="16" y="20" width="44" height="8" rx="3" fill="#ffd85b"/>
  <!-- T: vertical stem -->
  <rect x="30" y="20" width="8" height="34" rx="3" fill="#ffd85b"/>

  <!-- P: vertical bar -->
  <rect x="42" y="28" width="8" height="44" rx="3" fill="#ffd85b"/>
  <!-- P: rounded bump (top arc) -->
  <path d="M 42 28 Q 74 28 74 44 Q 74 60 42 60" stroke="#ffd85b" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Circuit dots (bottom-left, below T stem) -->
  <circle cx="20" cy="62" r="4" fill="#ffd85b"/>
  <circle cx="20" cy="74" r="4" fill="#ffd85b"/>
  <circle cx="32" cy="74" r="4" fill="#ffd85b"/>
</svg>
